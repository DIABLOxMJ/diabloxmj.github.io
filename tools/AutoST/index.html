<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lecteur & Traducteur Local de Sous-titres</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #121212; color: #fff; margin: 0; padding: 0;
            height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; overflow: hidden;
        }

        #top-bar {
            position: absolute; top: 15px; left: 20px; right: 20px;
            display: flex; justify-content: space-between; align-items: center; z-index: 10;
        }

        h1 { font-size: 1.1em; font-weight: 400; color: #aaaaaa; margin: 0; max-width: 35%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .btn-group { display: flex; gap: 10px; align-items: center; }

        button, select {
            background: #2a2a2a; color: #fff; border: 1px solid #444;
            padding: 8px 14px; border-radius: 6px; cursor: pointer;
            font-size: 0.9em; transition: all 0.2s;
        }
        button:hover { background: #3a3a3a; border-color: #666; }
        #generate-ia-btn { background: #007bff; border-color: #0069d9; }
        #generate-ia-btn:hover { background: #0062cc; }

		/* Redonner des couleurs dynamiques aux boutons d'action */
        #download-srt { background: #28a745; border-color: #1e7e34; }  /* Vert Succès */
        #download-srt:hover { background: #218838; }

        #save-project-btn { background: #ffc107; border-color: #e0a800; color: #000; } /* Jaune Alerte */
        #save-project-btn:hover { background: #e0a800; }

        /* Rendre le bouton "➕" plus visible par défaut au coin du lecteur */
        #fullscreen-btn {
            position: absolute !important;
            top: 15px !important;
            right: 15px !important;
            background: rgba(0, 123, 255, 0.6) !important; /* On lui donne un fond bleu semi-transparent par défaut */
            color: white !important;
            border: 1px solid rgba(255, 255, 255, 0.4) !important;
            padding: 6px 12px !important;
            font-size: 1.1em !important;
            border-radius: 6px !important;
            cursor: pointer !important;
            z-index: 10 !important;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); /* Petite ombre pour le décoller de la vidéo */
            transition: background 0.2s, transform 0.1s !important;
        }
        #fullscreen-btn:hover {
            background: rgba(0, 123, 255, 0.9) !important; /* Devient bleu éclatant au survol */
            transform: scale(1.1);
        }

        #drop-zone {
            border: 2px dashed #444; width: 60%; height: 200px;
            display: flex; justify-content: center; align-items: center;
            border-radius: 12px; color: #888; cursor: pointer; transition: background 0.3s;
        }
        #drop-zone:hover { background: #1a1a1a; color: #bbb; }

        #status-message { margin-bottom: 25px; font-size: 1.5em; color: #00abff; min-height: -20px; }

        /* --- CONTENEUR LECTEUR (MODE NORMAL) --- */
        #video-container {
            position: relative;
            width: 75vw;
            height: 60vh;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #video-container video {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Reste propre et proportionnel sur la page normale */
        }

        /* SOUS-TITRES STANDARD */
        #subtitles-display {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            color: white;
            font-size: 1.6em;
            text-align: center;
            width: 85%;
            pointer-events: none;
            text-shadow: 2px 2px 4px rgba(0,0,0,1), -2px -2px 4px rgba(0,0,0,1);
        }

        #exit-fullscreen-btn {
            display: none;
        }

        /* --- 🎬 LE MODE CINÉMA PROPRIÉTAIRE (FAUX PLEIN ÉCRAN FLUIDE) --- */
        #video-container.mode-cinema-total {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            max-width: 100vw !important;
            max-height: 100vh !important;
            border-radius: 0 !important;
            z-index: 999999 !important;
            background-color: #000000 !important;
        }

        /* On force la vidéo à zoomer et remplir l'écran à 100% sans bandes noires */
        #video-container.mode-cinema-total video {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover !important; 
        }

        /* Ajustement des sous-titres en mode plein écran */
        #video-container.mode-cinema-total #subtitles-display {
            font-size: 2.8em !important;
            bottom: 12% !important; /* Laisse de l'espace pour la barre d'avancement Windows/Chrome tout en bas */
            z-index: 2147483647 !important;
        }

		/* Style du bouton Agrandir "➕" au coin du lecteur */
        #fullscreen-btn {
            position: absolute !important;
            top: 15px !important;
            right: 15px !important;
            background: rgba(0, 0, 0, 0.5) !important;
            color: white !important;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            padding: 6px 12px !important;
            font-size: 1em !important;
            border-radius: 6px !important;
            cursor: pointer !important;
            z-index: 10 !important;
            transition: background 0.2s, transform 0.1s !important;
        }
        #fullscreen-btn:hover {
            background: rgba(0, 123, 255, 0.8) !important; /* Devient bleu électrique au survol */
            transform: scale(1.05);
        }

        /* En mode cinéma, on cache le bouton "➕" puisqu'on y est déjà ! */
        #video-container.mode-cinema-total #fullscreen-btn {
            display: none !important;
        }

        /* Le fameux bouton quitter en haut à droite */
        #video-container.mode-cinema-total #exit-fullscreen-btn {
            display: block !important;
            position: absolute !important;
            top: 25px !important;
            right: 25px !important;
            background: rgba(0, 0, 0, 0.6) !important;
            color: white !important;
            border: 1px solid rgba(255, 255, 255, 0.3) !important;
            padding: 10px 16px !important;
            font-size: 1.1em !important;
            border-radius: 8px !important;
            cursor: pointer !important;
            z-index: 2147483647 !important;
            transition: background 0.2s !important;
        }

        #video-container.mode-cinema-total #exit-fullscreen-btn:hover {
            background: rgba(217, 83, 79, 0.9) !important; /* Un joli rouge alerte au survol */
        }

		/* Ajustement dynamique si le fichier est un fichier audio pur (MP3, WAV) */
        #video-container.format-audio-seul #subtitles-display {
            bottom: 90px !important; /* Remonte le texte pour éviter la barre de lecture blanche */
            font-style: italic;
            color: #ffc107; /* Une jolie couleur jaune/or discrète pour les pistes musicales */
        }
    </style>
</head>
<body>

    <div id="top-bar">
        <h1 id="app-title">Lecteur & Traducteur Local</h1>
		<div class="btn-group">
            <select id="language-select">
                <option value="fr">Piste : Français 🇫🇷</option>
                <option value="en">Piste : English 🇬🇧</option>
            </select>
            
            <select id="audio-mode-select" style="background: #343a40; border-color: #4f5962;">
                <option value="standard">🎬 Mode : Film / Série</option>
                <option value="music">🎶 Mode : Musique / Clip</option>
            </select>

            <button id="generate-ia-btn">🚀 Lancer la génération IA</button>
            <button id="load-zip-btn">📂 Charger un pack (.ZIP)</button>
            <button id="change-video-btn">📂 Charger une vidéo</button>
            <button id="open-folder-btn" style="background: #17a2b8;">📂 Ouvrir le dossier</button>
            
            <button id="download-srt" style="display: none;" disabled>📥 Télécharger</button>
            <button id="save-project-btn" style="display: none;" disabled>💾 Sauvegarder</button>
        </div>
    </div>
    
    <div id="drop-zone">Glissez votre vidéo ici pour commencer</div>
    
    <input type="file" id="file-input" accept="video/*" style="display: none;">
    <input type="file" id="zip-input" accept=".zip" style="display: none;">

    <div id="status-message"></div>

    <div id="video-container" style="display: none;">
        <video id="video-player" controls controlsList="nofullscreen"></video>
        <div id="subtitles-display"></div>
        <button id="fullscreen-btn" title="Passer en plein écran">➕</button>
        <button id="exit-fullscreen-btn" title="Quitter le plein écran">❌</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
